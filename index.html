<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparking ZERO - Character Select</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="tv-screen">
        <div class="game-bg">
            <div class="bg-gradient"></div>
            <div class="grid-floor"></div>
            <div id="particles-container" class="particles-container"></div>
            <div class="atmosphere-layer"></div>
        </div>

        <div class="ui-layer">
            
            <div class="hud-bar top-bar">
                <div class="player-badge">
                    <img src="images/4stars.png" alt="Logo" class="p-logo">
                </div>
                <div class="rail-wrapper">
                    <div id="p1-strip" class="icon-strip">
                        </div>
                </div>
            </div>

            <div class="main-content">
                
                <div class="render-area">
                    <img id="main-render" src="" alt="">
                </div>

                <div class="left-panel">
                    <div class="name-plate-wrapper">
                        <div class="name-plate main-plate">
                            <span id="char-name-main" class="plate-text">...</span>
                            <div class="plate-glass"></div>
                        </div>
                        <div class="name-plate sub-plate">
                            <span id="char-name-sub" class="plate-text">...</span>
                            <div class="plate-glass"></div>
                        </div>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="info-header">DATOS DEL PERSONAJE</div>
                    
                    <div class="stats-container">
                        <div class="stat-row"><span class="stat-label">ATK</span><div class="stat-bar-bg"><div id="stat-atk" class="stat-bar-fill"></div></div></div>
                        <div class="stat-row"><span class="stat-label">DEF</span><div class="stat-bar-bg"><div id="stat-def" class="stat-bar-fill"></div></div></div>
                        <div class="stat-row"><span class="stat-label">SPD</span><div class="stat-bar-bg"><div id="stat-spd" class="stat-bar-fill"></div></div></div>
                        <div class="stat-row"><span class="stat-label">KI</span><div class="stat-bar-bg"><div id="stat-ki" class="stat-bar-fill"></div></div></div>
                    </div>

                    <div id="char-bio" class="bio-box">...</div>

                    <div class="forms-list-container">
                        <div class="info-sub-header">FORMAS / TRANSF.</div>
                        <div id="forms-list">
                            </div>
                    </div>
                </div>
            </div>

            <div class="hud-bar bottom-bar">
                <span id="helper-text" class="helper-text">...</span>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
